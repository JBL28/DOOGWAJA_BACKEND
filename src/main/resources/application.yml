spring:
  application:
    name: dogwaja-backend

  datasource:
    url: jdbc:mysql://localhost:3306/doogwaja?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  security:
    require-ssl: false

server:
  port: 8080

jwt:
  secret: ZG9nd2FqYS1zZWNyZXQta2V5LW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHMtbG9uZy1mb3ItaHMyNTYtYWxnb3JpdGht
  access-token-expiration: 3600000       # 1 hour
  refresh-token-expiration: 604800000    # 7 days

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    dev.ssafy: DEBUG
    org.hibernate.SQL: DEBUG

---
# H2 in-memory DB for local development / test
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:dogwaja;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console
